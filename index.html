<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육용 뽀모도로 타이머</title>
    <!-- Tailwind CSS 설정 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 외부 CSS 링크 -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="bg-white rounded-3xl shadow-xl w-full max-w-md p-8 mode-work">
        <!-- 헤더 섹션 -->
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-brain text-indigo-500 mr-2"></i>뽀모도로 학습 타이머</h1>
            <button id="settings-btn" class="text-gray-500 hover:text-gray-800 transition-colors" title="설정">
                <i class="fas fa-cog text-xl"></i>
            </button>
        </div>

        <!-- 설정 패널 -->
        <div id="settings-panel" class="bg-gray-50 rounded-xl p-4 mb-6 border border-gray-200">
            <h3 class="text-sm font-bold text-gray-700 mb-3 border-b pb-2">타이머 설정 (분)</h3>
            
            <div class="space-y-4">
                <!-- 집중 시간 설정 -->
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="work-time-slider" class="text-sm text-gray-600 font-medium">집중 시간</label>
                        <span id="work-time-display" class="text-sm font-bold text-red-500">25</span>
                    </div>
                    <input type="range" id="work-time-slider" min="1" max="60" value="25" class="w-full">
                </div>
                
                <!-- 휴식 시간 설정 -->
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="break-time-slider" class="text-sm text-gray-600 font-medium">휴식 시간</label>
                        <span id="break-time-display" class="text-sm font-bold text-emerald-500">5</span>
                    </div>
                    <input type="range" id="break-time-slider" min="1" max="30" value="5" class="w-full">
                </div>
                
                <div class="flex justify-end pt-2">
                    <button id="apply-settings-btn" class="text-xs bg-indigo-100 text-indigo-700 font-medium px-3 py-1 rounded hover:bg-indigo-200 transition-colors">적용</button>
                </div>
            </div>
        </div>

        <!-- 타이머 디스플레이 영역 (아날로그) -->
        <div class="analog-timer-container my-8 cursor-pointer" id="timer-face" title="클릭하여 집중/휴식 모드 전환">
            <svg id="analog-clock" viewBox="0 0 200 200" class="w-full h-full drop-shadow-xl rounded-full bg-white">
                <!-- 아날로그 시계 배경 테두리 -->
                <circle cx="100" cy="100" r="95" fill="#ffffff" stroke="#f3f4f6" stroke-width="4"/>
                <!-- 시계 눈금 (JS로 생성) -->
                <g id="clock-ticks"></g>
                <!-- 남은 시간 부채꼴 -->
                <path id="time-wedge" d="" fill="#ef4444" opacity="0.85" style="transition: fill 0.3s;" />
                <!-- 분침(진행 바늘) -->
                <line id="progress-hand" x1="100" y1="100" x2="100" y2="10" stroke="#1f2937" stroke-width="3" stroke-linecap="round" style="transition: transform 1s linear;" />
                <!-- 중심점 -->
                <circle cx="100" cy="100" r="6" fill="#374151" />
                <circle cx="100" cy="100" r="2" fill="#ffffff" />
            </svg>
            <!-- 텍스트 오버레이 -->
            <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-14">
                <div id="time-display" class="timer-text text-3xl font-bold bg-white/80 px-4 py-1 rounded-xl backdrop-blur-sm shadow-sm mt-16">25:00</div>
                <div id="mode-display" class="mode-text text-sm font-bold text-gray-600 mt-1 bg-white/80 px-2 py-0.5 rounded backdrop-blur-sm shadow-sm">집중 시간</div>
            </div>
        </div>

        <!-- 컨트롤 버튼 -->
        <div class="flex justify-center space-x-4 mb-8">
            <button id="start-btn" class="w-16 h-16 rounded-full bg-indigo-600 text-white flex items-center justify-center text-xl shadow-lg hover:bg-indigo-700 transition-transform transform hover:scale-105" title="시작">
                <i class="fas fa-play ml-1"></i>
            </button>
            <button id="pause-btn" class="w-16 h-16 rounded-full bg-gray-200 text-gray-700 flex items-center justify-center text-xl shadow hover:bg-gray-300 transition-transform transform hover:scale-105 hidden" title="일시정지">
                <i class="fas fa-pause"></i>
            </button>
            <button id="reset-btn" class="w-16 h-16 rounded-full bg-gray-200 text-gray-700 flex items-center justify-center text-xl shadow hover:bg-gray-300 transition-transform transform hover:scale-105" title="초기화">
                <i class="fas fa-redo-alt"></i>
            </button>
        </div>

        <!-- 세션 진행 상태 -->
        <div class="text-center bg-gray-50 rounded-xl p-4">
            <div class="text-sm text-gray-500 mb-2">오늘 완료한 뽀모도로</div>
            <div class="flex justify-center items-center space-x-2" id="session-dots">
                <!-- 완료된 세션만큼 점이 추가됩니다 -->
                <span class="text-gray-300"><i class="fas fa-circle text-xs"></i></span>
                <span class="text-gray-300"><i class="fas fa-circle text-xs"></i></span>
                <span class="text-gray-300"><i class="fas fa-circle text-xs"></i></span>
                <span class="text-gray-300"><i class="fas fa-circle text-xs"></i></span>
            </div>
            <div class="mt-2 text-xs text-gray-400">4번의 집중 후에는 긴 휴식을 취하세요</div>
        </div>
        
        <!-- 오디오 요소 (보이지 않음) -->
        <audio id="alarm-sound" preload="auto"></audio>
    </div>

    <!-- 외부 JS 스크립트 연결 -->
    <script src="script.js"></script>
</body>
</html>
